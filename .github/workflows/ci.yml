name: CI

on:
  pull_request:
  push:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      # Vitest 4 has been observed to exit 0 when all suites fail to load
      # (cold-cache "failed to find the current suite" path). Assert that
      # at least one test file actually passed so the CI gate stays honest.
      - name: Run tests
        env:
          NO_COLOR: '1'
        run: |
          npm run test 2>&1 | tee test-output.log
          if ! grep -qE "Test Files +[0-9]+ passed" test-output.log; then
            echo "::error::No passing test files in vitest output — possible silent failure"
            exit 1
          fi
      - run: npm run lint -- --max-warnings 0

  deploy-preview:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: preview
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm i -g vercel
      - run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - run: vercel build --token="$VERCEL_TOKEN"
      - name: Deploy preview and update staging alias
        run: |
          url="$(vercel deploy --prebuilt --token="$VERCEL_TOKEN")"
          vercel alias set "$url" dicetable-staging.vercel.app --token="$VERCEL_TOKEN"
          echo "Staging URL: https://dicetable-staging.vercel.app" >> "$GITHUB_STEP_SUMMARY"
          echo "Deploy URL: $url" >> "$GITHUB_STEP_SUMMARY"

  deploy-production:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm i -g vercel
      - run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - run: vercel build --prod --token="$VERCEL_TOKEN"
      - name: Deploy production
        run: |
          url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "Production URL: $url" >> "$GITHUB_STEP_SUMMARY"
