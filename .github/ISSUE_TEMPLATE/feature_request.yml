name: Feature request
description: Suggest a new feature, a UI improvement, or a behavioral change.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea, feature requests are welcome.

        DiceTable stays lean on purpose, so the features most likely to land are the ones several people ask for. If a similar request already exists, please add a 👍 to it instead of filing a new one. That demand is the main signal used to prioritize.

        Describe your idea below and lead with the problem it solves.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or friction this feature would address. Lead with the user need, not the proposed solution.
      placeholder: "When I'm comparing X vs Y, I currently have to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work? Sketches, mockups, or rough UI descriptions are welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you didn't pick them.

  - type: dropdown
    id: scope
    attributes:
      label: Scope category
      description: Which layer does this touch?
      options:
        - UI / styling only
        - New table column or stat
        - New dice mechanic (engine change)
        - Chart / visualization
        - Persistence / storage
        - Other / not sure
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmations
      options:
        - label: I have searched existing issues and discussions for similar proposals.
          required: true
        - label: I have read the project scope rules in CONTRIBUTING.md.
          required: true
        - label: I have read the [Code of Conduct](https://github.com/a1clark1a/diceTable/blob/main/CODE_OF_CONDUCT.md).
          required: true
